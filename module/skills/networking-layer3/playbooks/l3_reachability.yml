---
- name: Layer-3 reachability + routing audit (read-only)
  hosts: all
  gather_facts: true
  become: false
  vars:
    incident_slug: "{{ incident_slug | default('unscoped') }}"
    targets: "{{ targets | mandatory }}"        # list of IPs or hostnames
  tasks:

    - name: IP addresses
      ansible.builtin.command: ip -4 -o addr show
      register: ip_addrs
      changed_when: false

    - name: Routing table
      ansible.builtin.command: ip route show
      register: routes
      changed_when: false

    - name: Resolve route for each target
      ansible.builtin.command: "ip route get {{ item }}"
      register: route_get
      loop: "{{ targets }}"
      changed_when: false
      failed_when: false

    - name: Ping each target
      ansible.builtin.command: "ping -c 3 -W 2 -n {{ item }}"
      register: ping_out
      loop: "{{ targets }}"
      changed_when: false
      failed_when: false

    - name: Traceroute each target
      ansible.builtin.command: "traceroute -n -w 2 -q 1 -m 20 {{ item }}"
      register: trace_out
      loop: "{{ targets }}"
      changed_when: false
      failed_when: false

    - name: Emit L3 reachability report
      ansible.builtin.debug:
        msg:
          incident_slug: "{{ incident_slug }}"
          host: "{{ inventory_hostname }}"
          ip_addresses: "{{ ip_addrs.stdout_lines }}"
          routing_table: "{{ routes.stdout_lines }}"
          route_for_target: "{{ route_get.results | map(attribute='stdout_lines') | list }}"
          ping: "{{ ping_out.results | map(attribute='stdout_lines') | list }}"
          traceroute: "{{ trace_out.results | map(attribute='stdout_lines') | list }}"
